<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AGOS — The operating system for autonomous growth</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
:root{
  --bg:#f6f7f9; --panel:#fff; --panel-2:#fbfbfd;
  --ink:#0b1220; --ink-2:#2a3346; --ink-3:#5c677d; --ink-4:#8a93a6; --ink-5:#b7bdcb;
  --line:#e6e8ef; --line-2:#eef0f5; --line-3:#d8dbe4;
  --nav:#0f1423; --nav-2:#161b2e; --nav-3:#1d2338; --nav-line:#252b41;
  --nav-ink:#c9cde0; --nav-ink-2:#8a90a8; --nav-ink-3:#5b6282;
  --accent:#2f6feb; --accent-bg:#eaf1ff; --accent-line:#c9dbff;
  --ok:#0f8a5f; --ok-bg:#e4f5ec;
  --warn:#b8741a; --warn-bg:#fbf0de;
  --esc:#c25216; --esc-bg:#fbe6d7;
  --bad:#c02525; --bad-bg:#fbe2e2;
  --radius:8px; --radius-sm:6px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:'Geist',system-ui,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-feature-settings:"ss01","cv11";font-size:15px;line-height:1.55}
.mono{font-family:'Geist Mono',ui-monospace,monospace;font-feature-settings:"ss02","zero"}
.tnum{font-variant-numeric:tabular-nums}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;cursor:pointer;background:transparent;border:0}

/* ========= layout ========= */
.wrap{max-width:1200px;margin:0 auto;padding:0 28px}
.wrap-narrow{max-width:960px;margin:0 auto;padding:0 28px}

/* ========= top nav ========= */
.topnav{
  position:sticky;top:0;z-index:50;
  backdrop-filter:saturate(140%) blur(14px);
  background:rgba(15,20,35,0.72);
  border-bottom:1px solid var(--nav-line);
  color:#fff;
}
.topnav .inner{display:flex;align-items:center;gap:28px;height:56px;max-width:1200px;margin:0 auto;padding:0 28px}
.brand-lockup{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:500}
.brand-glyph{width:26px;height:26px;border-radius:6px;background:linear-gradient(140deg,#2f6feb 0%,#0b1a3a 100%);display:grid;place-items:center;color:#fff;font-weight:600;font-size:12px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
.brand-lockup .mono{font-size:10px;color:var(--nav-ink-3);letter-spacing:.14em;text-transform:uppercase;margin-left:2px}
.nav-links{display:flex;gap:4px;margin-left:auto}
.nav-links a{
  font-size:13px;color:var(--nav-ink);padding:7px 12px;border-radius:5px;transition:background 120ms;
}
.nav-links a:hover{background:var(--nav-2);color:#fff}
.nav-links a.on{color:#fff;background:var(--nav-2)}
.nav-cta{display:flex;gap:8px;margin-left:12px}

.btn{display:inline-flex;align-items:center;gap:6px;padding:0 14px;height:34px;border-radius:6px;font-size:13px;font-weight:500;border:1px solid transparent;transition:all 140ms}
.btn.primary{background:var(--accent);color:#fff;border-color:color-mix(in oklab,var(--accent) 80%,black)}
.btn.primary:hover{background:color-mix(in oklab,var(--accent) 92%,black)}
.btn.ghost{color:#fff;border-color:var(--nav-line)}
.btn.ghost:hover{background:var(--nav-2);border-color:var(--nav-3)}
.btn.ghost-dark{color:var(--ink-2);border-color:var(--line-3);background:var(--panel)}
.btn.ghost-dark:hover{background:var(--bg)}
.btn.lg{height:42px;padding:0 18px;font-size:14px;border-radius:7px}
.btn .kbd{font-family:'Geist Mono',monospace;font-size:10px;background:rgba(255,255,255,.08);color:var(--nav-ink-3);padding:1px 5px;border-radius:3px;margin-left:4px}

/* ========= hero ========= */
.hero{
  position:relative;overflow:hidden;
  background:
    radial-gradient(1200px 500px at 20% -10%, rgba(47,111,235,.22), transparent 60%),
    radial-gradient(1000px 500px at 85% 0%, rgba(109,69,230,.15), transparent 60%),
    linear-gradient(180deg, #0b1020 0%, #0f1423 60%, #10162a 100%);
  color:#e8ecf7;
  padding:72px 0 56px;
  border-bottom:1px solid var(--nav-line);
}
.hero .grid-bg{
  position:absolute;inset:0;pointer-events:none;opacity:.35;
  background-image:
    linear-gradient(to right, rgba(255,255,255,.04) 1px, transparent 1px),
    linear-gradient(to bottom, rgba(255,255,255,.04) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse at 50% 30%, black 40%, transparent 75%);
}
.hero .inner{position:relative}
.eyebrow{display:inline-flex;align-items:center;gap:8px;padding:4px 10px 4px 6px;border:1px solid var(--nav-line);border-radius:20px;background:rgba(255,255,255,.04);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--nav-ink);font-family:'Geist Mono',monospace}
.eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px rgba(47,111,235,.25)}
.eyebrow .pill{background:rgba(47,111,235,.18);color:#b7ccff;padding:2px 7px;border-radius:10px;font-size:10px}

h1.display{
  font-size:clamp(40px,6vw,72px);
  line-height:1.02;
  letter-spacing:-0.035em;
  font-weight:500;
  margin:20px 0 18px;
  color:#fff;
  max-width:900px;
  text-wrap:balance;
}
h1.display em{font-style:normal;color:#b7ccff;background:linear-gradient(180deg,#b7ccff 20%,#7a9dff 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sub-lead{font-size:19px;line-height:1.55;color:var(--nav-ink);max-width:620px;margin:0 0 28px}
.hero-cta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}

.hero-meta{display:flex;gap:32px;flex-wrap:wrap;margin-top:12px;color:var(--nav-ink-2);font-size:12px;font-family:'Geist Mono',monospace;letter-spacing:.04em;text-transform:uppercase}
.hero-meta span{display:flex;align-items:center;gap:8px}
.hero-meta .dot{width:5px;height:5px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px rgba(15,138,95,.25)}

/* mini product screenshot inline in hero */
.hero-canvas{
  margin-top:48px;
  border:1px solid var(--nav-line);
  border-radius:12px;
  background:#0b1020;
  box-shadow:0 40px 80px -20px rgba(0,0,0,.6), 0 0 0 1px rgba(255,255,255,.03) inset;
  overflow:hidden;
  position:relative;
}
.hero-canvas .chrome{height:32px;border-bottom:1px solid var(--nav-line);display:flex;align-items:center;gap:8px;padding:0 14px;background:#0e142a}
.hero-canvas .chrome .dot{width:10px;height:10px;border-radius:50%;background:#2b324a}
.hero-canvas .chrome .url{margin:0 auto;font-size:11px;color:var(--nav-ink-3);font-family:'Geist Mono',monospace}

/* ========= sections ========= */
section{padding:88px 0;border-bottom:1px solid var(--line)}
section.dark{background:#0f1423;color:#e8ecf7;border-color:var(--nav-line)}
section.tight{padding:64px 0}

.section-eye{
  display:inline-flex;align-items:center;gap:8px;padding:4px 10px;border:1px solid var(--line-3);border-radius:20px;background:var(--panel);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3);font-family:'Geist Mono',monospace;
}
section.dark .section-eye{background:rgba(255,255,255,.04);border-color:var(--nav-line);color:var(--nav-ink)}
.section-head{max-width:720px;margin:0 0 40px}
.section-head h2{font-size:clamp(32px,4.2vw,48px);line-height:1.05;letter-spacing:-0.025em;font-weight:500;margin:14px 0 14px;text-wrap:balance}
.section-head p{font-size:17px;color:var(--ink-3);line-height:1.55;margin:0}
section.dark .section-head p{color:var(--nav-ink)}

/* ========= problem/solution ========= */
.ps-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.ps-card{
  border:1px solid var(--line);border-radius:12px;padding:28px;background:var(--panel);
}
.ps-card.bad{background:var(--panel-2)}
.ps-card.good{background:linear-gradient(180deg, #fff 0%, #f4f8ff 100%);border-color:var(--accent-line)}
.ps-card h3{font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin:0 0 16px;font-weight:600}
.ps-card.good h3{color:var(--accent)}
.ps-card .big{font-size:22px;letter-spacing:-0.015em;line-height:1.3;font-weight:500;margin:0 0 18px}
.ps-card ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px}
.ps-card li{display:flex;gap:10px;font-size:14px;color:var(--ink-2);line-height:1.5}
.ps-card li .mk{flex:0 0 18px;margin-top:2px;color:var(--bad)}
.ps-card.good li .mk{color:var(--ok)}
.ps-card .foot{margin-top:22px;padding-top:18px;border-top:1px dashed var(--line-3);font-family:'Geist Mono',monospace;font-size:12px;color:var(--ink-3);display:flex;justify-content:space-between;align-items:center}
.ps-card.good .foot{border-color:var(--accent-line);color:var(--accent)}

/* ========= stack replacement table ========= */
.stack-tbl{
  border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel);
}
.stack-tbl .row{
  display:grid;grid-template-columns:220px 1fr 180px 1fr;gap:0;
  border-bottom:1px solid var(--line-2);
  align-items:center;
}
.stack-tbl .row:last-child{border-bottom:0}
.stack-tbl .row > div{padding:16px 20px;border-right:1px solid var(--line-2)}
.stack-tbl .row > div:last-child{border-right:0}
.stack-tbl .hd{background:var(--panel-2);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3);font-weight:600;padding:12px 20px!important}
.stack-tbl .tool-name{font-weight:500;font-size:15px;display:flex;align-items:center;gap:10px}
.stack-tbl .tool-ico{width:26px;height:26px;border-radius:5px;background:var(--line-2);color:var(--ink-2);display:grid;place-items:center;font-size:12px;font-weight:600}
.stack-tbl .cost{font-family:'Geist Mono',monospace;color:var(--ink-2);font-size:13px;font-variant-numeric:tabular-nums}
.stack-tbl .arrow{display:flex;justify-content:center;color:var(--ink-5)}
.stack-tbl .replaces{display:flex;align-items:center;gap:10px;font-size:14px}
.stack-tbl .replaces .pill{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-line);padding:2px 8px;border-radius:10px;font-size:11px;font-family:'Geist Mono',monospace;font-weight:500}

.stack-foot{
  margin-top:16px;display:grid;grid-template-columns:1fr 1fr;gap:16px;
}
.stack-foot .totals{
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 24px;border:1px solid var(--line);border-radius:12px;background:var(--panel);
}
.stack-foot .totals.agos{background:#0f1423;color:#fff;border-color:var(--nav-line)}
.totals .lab{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-4);margin-bottom:4px}
.totals.agos .lab{color:var(--nav-ink-2)}
.totals .val{font-size:28px;letter-spacing:-0.02em;font-weight:500;font-variant-numeric:tabular-nums}
.totals .val small{font-size:14px;color:var(--ink-4);font-weight:400;margin-left:4px}
.totals.agos .val small{color:var(--nav-ink-2)}
.totals .savings{font-family:'Geist Mono',monospace;font-size:12px;background:var(--ok-bg);color:var(--ok);padding:6px 10px;border-radius:6px}
.totals.agos .savings{background:rgba(47,111,235,.16);color:#b7ccff}

/* ========= agent diagram ========= */
.agent-viz{
  position:relative;aspect-ratio:1.4/1;max-width:880px;margin:0 auto;
  border:1px solid var(--nav-line);border-radius:16px;overflow:hidden;
  background:
    radial-gradient(500px 300px at 50% 50%, rgba(47,111,235,.25), transparent 55%),
    linear-gradient(180deg,#0b1020,#0f1423);
}
.agent-viz .grid-bg{
  position:absolute;inset:0;opacity:.3;
  background-image:linear-gradient(to right,rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,.035) 1px,transparent 1px);
  background-size:40px 40px;
}
.agent-node{
  position:absolute;
  display:flex;align-items:center;gap:10px;
  background:rgba(22,27,46,.9);
  border:1px solid var(--nav-line);
  border-radius:10px;padding:9px 12px;
  color:#fff;font-size:12px;font-weight:500;
  box-shadow:0 8px 20px -8px rgba(0,0,0,.5);
  backdrop-filter:blur(6px);
  min-width:170px;
}
.agent-node .ico{width:22px;height:22px;border-radius:5px;background:rgba(47,111,235,.18);color:#b7ccff;display:grid;place-items:center;font-family:'Geist Mono',monospace;font-size:11px;font-weight:600;flex:0 0 22px}
.agent-node .name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.agent-node .mono{font-size:9px;color:var(--nav-ink-3);letter-spacing:.1em}
.agent-node.core{
  background:linear-gradient(140deg,#2f6feb 0%,#1a2d66 100%);
  border-color:rgba(255,255,255,.2);
  padding:14px 18px;
  box-shadow:0 0 0 6px rgba(47,111,235,.12), 0 16px 40px -10px rgba(47,111,235,.5);
}
.agent-node.core .ico{background:rgba(255,255,255,.2);color:#fff}

/* ========= screenshots =========*/
.ss-showcase{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.ss-showcase.three{grid-template-columns:1fr 1fr 1fr;gap:16px}
.ss-card{
  border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel);
  display:flex;flex-direction:column;
}
.ss-card .ss-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.ss-card .ss-head h4{margin:0;font-size:16px;font-weight:500;letter-spacing:-0.01em}
.ss-card .ss-head .mono{font-size:11px;color:var(--ink-4);letter-spacing:.08em;text-transform:uppercase}
.ss-card .ss-head p{margin:4px 0 0;font-size:13px;color:var(--ink-3);line-height:1.5}
.ss-card .ss-body{background:var(--bg);padding:14px;flex:1;min-height:260px}

/* ========= social proof ========= */
.logos{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel)}
.logos .cell{padding:26px;display:grid;place-items:center;border-right:1px solid var(--line-2);color:var(--ink-4);font-weight:600;font-size:14px;letter-spacing:-0.01em;text-align:center}
.logos .cell:last-child{border-right:0;color:var(--accent);font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:500}

.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:32px}
.testi{
  border:1px solid var(--line);border-radius:12px;padding:24px;background:var(--panel);display:flex;flex-direction:column;gap:14px;
}
.testi .quote{font-size:15px;line-height:1.55;color:var(--ink-2)}
.testi .auth{display:flex;align-items:center;gap:10px;margin-top:auto}
.testi .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(140deg,#2f6feb,#0b1a3a);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:500}
.testi .n{font-size:13px;font-weight:500}
.testi .r{font-size:11px;color:var(--ink-4);font-family:'Geist Mono',monospace;letter-spacing:.04em;text-transform:uppercase}
.testi .meta{display:flex;gap:10px;font-size:11px;color:var(--ink-4);font-family:'Geist Mono',monospace;padding-top:10px;border-top:1px dashed var(--line-3)}
.testi .meta .up{color:var(--ok)}

/* ========= big CTA ========= */
.bigcta{
  text-align:center;padding:80px 28px;border-radius:16px;
  background:
    radial-gradient(600px 300px at 50% 0%, rgba(47,111,235,.3), transparent 60%),
    linear-gradient(180deg,#0f1423,#0b1020);
  color:#fff;border:1px solid var(--nav-line);
  position:relative;overflow:hidden;
}
.bigcta .grid-bg{position:absolute;inset:0;opacity:.3;background-image:linear-gradient(to right,rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(to bottom,rgba(255,255,255,.04) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse at 50% 50%,black 40%,transparent 75%)}
.bigcta h2{position:relative;font-size:clamp(32px,4.2vw,46px);letter-spacing:-0.025em;line-height:1.05;font-weight:500;margin:0 0 12px;text-wrap:balance}
.bigcta p{position:relative;font-size:17px;color:var(--nav-ink);margin:0 0 28px;max-width:520px;margin-left:auto;margin-right:auto}
.bigcta .cta-row{position:relative;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.bigcta .small{position:relative;margin-top:18px;font-size:11px;color:var(--nav-ink-3);font-family:'Geist Mono',monospace;letter-spacing:.08em;text-transform:uppercase}

/* ========= footer ========= */
footer{background:#0b1020;color:var(--nav-ink);padding:64px 0 40px}
footer .grid{display:grid;grid-template-columns:1.3fr 1fr 1fr 1fr 1fr;gap:32px}
footer .brand-lockup{color:#fff;margin-bottom:12px}
footer .tag{color:var(--nav-ink-3);font-size:13px;max-width:280px;line-height:1.6}
footer h5{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--nav-ink-3);margin:0 0 14px;font-weight:600}
footer ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px}
footer a{color:var(--nav-ink);font-size:13px}
footer a:hover{color:#fff}
footer .foot-bottom{margin-top:48px;padding-top:24px;border-top:1px solid var(--nav-line);display:flex;justify-content:space-between;font-size:12px;color:var(--nav-ink-3);font-family:'Geist Mono',monospace;flex-wrap:wrap;gap:12px}

/* ========= pricing ========= */
.pricing-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.price-card{
  border:1px solid var(--line);border-radius:12px;padding:26px;background:var(--panel);
  display:flex;flex-direction:column;gap:16px;
}
.price-card.feat{background:linear-gradient(180deg,#0f1423,#10162a);color:#fff;border-color:var(--nav-line);position:relative}
.price-card.feat::after{content:"MOST POPULAR";position:absolute;top:-10px;right:20px;background:var(--accent);color:#fff;padding:3px 10px;border-radius:10px;font-size:10px;font-family:'Geist Mono',monospace;letter-spacing:.12em;font-weight:600}
.price-card h3{margin:0;font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3);font-weight:600}
.price-card.feat h3{color:var(--nav-ink-2)}
.price-card .price{font-size:40px;letter-spacing:-0.02em;font-weight:500;line-height:1;font-variant-numeric:tabular-nums}
.price-card .price small{font-size:14px;color:var(--ink-4);font-weight:400;margin-left:4px}
.price-card.feat .price small{color:var(--nav-ink-2)}
.price-card p.desc{margin:0;color:var(--ink-3);font-size:13px;line-height:1.5}
.price-card.feat p.desc{color:var(--nav-ink)}
.price-card .feats{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:8px;font-size:13px;color:var(--ink-2)}
.price-card.feat .feats{color:var(--nav-ink)}
.price-card .feats li{display:flex;gap:8px;align-items:flex-start}
.price-card .feats .c{color:var(--ok);flex:0 0 14px;margin-top:2px}
.price-card.feat .feats .c{color:#6dd9a7}

/* ========= compare ========= */
.compare-tbl{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel)}
.compare-tbl .row{display:grid;grid-template-columns:1.4fr repeat(4,1fr);border-bottom:1px solid var(--line-2);align-items:center}
.compare-tbl .row:last-child{border-bottom:0}
.compare-tbl .row > div{padding:14px 18px;border-right:1px solid var(--line-2);font-size:13px}
.compare-tbl .row > div:last-child{border-right:0}
.compare-tbl .hd{background:var(--panel-2);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);font-weight:600;padding:12px 18px!important;display:flex;align-items:center;gap:8px}
.compare-tbl .hd.agos{background:#eaf1ff;color:var(--accent)}
.compare-tbl .cell-feat{font-weight:500}
.compare-tbl .c-yes{color:var(--ok);font-family:'Geist Mono',monospace;font-size:12px}
.compare-tbl .c-no{color:var(--ink-5);font-family:'Geist Mono',monospace;font-size:12px}
.compare-tbl .c-mid{color:var(--warn);font-family:'Geist Mono',monospace;font-size:11px}
.compare-tbl .agos-col{background:#f4f8ff}

/* ========= use cases ========= */
.usecase-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.usecase{
  border:1px solid var(--line);border-radius:12px;padding:28px;background:var(--panel);
  display:flex;flex-direction:column;gap:14px;
  position:relative;overflow:hidden;
}
.usecase .tag{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border:1px solid var(--line-3);border-radius:10px;font-size:11px;color:var(--ink-3);font-family:'Geist Mono',monospace;letter-spacing:.06em;text-transform:uppercase;width:fit-content}
.usecase h3{margin:0;font-size:22px;font-weight:500;letter-spacing:-0.015em}
.usecase p{margin:0;color:var(--ink-3);font-size:14px;line-height:1.6}
.usecase .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;padding-top:16px;border-top:1px dashed var(--line-3)}
.usecase .stat .v{font-size:22px;letter-spacing:-0.015em;font-weight:500;font-variant-numeric:tabular-nums}
.usecase .stat .l{font-size:10px;color:var(--ink-4);letter-spacing:.12em;text-transform:uppercase;font-family:'Geist Mono',monospace;margin-top:2px}

/* ========= faq ========= */
.faq{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel)}
.faq-row{border-bottom:1px solid var(--line-2)}
.faq-row:last-child{border-bottom:0}
.faq-row summary{list-style:none;cursor:pointer;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;font-size:15px;font-weight:500;gap:16px}
.faq-row summary::-webkit-details-marker{display:none}
.faq-row summary:hover{background:var(--panel-2)}
.faq-row summary .plus{color:var(--ink-4);font-family:'Geist Mono',monospace;transition:transform 140ms;flex:0 0 auto}
.faq-row[open] summary .plus{transform:rotate(45deg);color:var(--accent)}
.faq-row .ans{padding:0 22px 20px;color:var(--ink-3);font-size:14px;line-height:1.6;max-width:720px}

/* ========= flow diagram ========= */
.flow{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel)}
.flow-step{padding:28px 22px;border-right:1px solid var(--line);position:relative;display:flex;flex-direction:column}
.flow-step:last-child{border-right:0}
.flow-step .n{font-family:'Geist Mono',monospace;font-size:11px;color:var(--ink-4);letter-spacing:.14em}
.flow-step h4{margin:6px 0 6px;font-size:17px;font-weight:500;letter-spacing:-0.01em}
.flow-step p{margin:0 0 16px;font-size:13px;color:var(--ink-3);line-height:1.5}
.flow-step .agent{margin-top:auto;padding:3px 8px;display:inline-flex;align-self:flex-start;align-items:center;gap:6px;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-line);border-radius:10px;font-size:11px;font-family:'Geist Mono',monospace;font-weight:500}
.flow-step .human{background:var(--warn-bg);color:var(--warn);border-color:color-mix(in srgb, var(--warn) 20%, transparent)}
.flow-step::after{
  content:"";position:absolute;right:-8px;top:50%;width:16px;height:16px;border-top:1px solid var(--line);border-right:1px solid var(--line);transform:translateY(-50%) rotate(45deg);background:var(--panel);z-index:2;
}
.flow-step:last-child::after{display:none}

/* mock shots inline */
.mock{
  border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel);
  box-shadow:0 20px 40px -20px rgba(12,20,42,.15);
  font-size:12px;
}
.mock-head{background:var(--panel-2);border-bottom:1px solid var(--line);padding:8px 12px;display:flex;align-items:center;gap:6px;color:var(--ink-4);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase}
.mock-body{padding:14px}

/* misc */
.reveal{opacity:0;transform:translateY(16px);transition:opacity 600ms ease, transform 600ms ease}
.reveal.in{opacity:1;transform:none}

/* ========= docs ========= */
.docs-callout{
  display:grid;grid-template-columns:auto auto 1fr;grid-template-rows:auto auto;
  column-gap:24px;row-gap:14px;
  border:1px solid var(--line);border-radius:12px;padding:28px 32px;
  background:linear-gradient(180deg,#fff,var(--panel-2));
  align-items:center;
}
.docs-callout .dc-big{
  grid-row:1/3;font-size:120px;line-height:1;font-weight:500;color:var(--accent);
  letter-spacing:-0.04em;font-variant-numeric:tabular-nums;
}
.docs-callout .dc-unit{
  grid-row:1/3;font-size:18px;color:var(--ink-3);letter-spacing:.14em;align-self:end;padding-bottom:10px;
}
.docs-callout .dc-body{grid-column:3;grid-row:1}
.docs-callout .dc-title{font-size:20px;font-weight:500;letter-spacing:-0.01em;margin-bottom:6px}
.docs-callout .dc-body p{margin:0;color:var(--ink-3);font-size:14px;line-height:1.55;max-width:580px}
.docs-callout .dc-legend{display:flex;gap:16px;margin-top:10px;font-family:'Geist Mono',monospace;font-size:11px;color:var(--ink-3);letter-spacing:.04em}
.dc-sw{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:-1px}
.docs-callout .dc-bar{grid-column:1/-1;grid-row:2;display:flex;height:36px;border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.dc-seg{display:flex;align-items:center;justify-content:space-between;padding:0 10px;color:#fff;overflow:hidden;position:relative;border-right:1px solid rgba(255,255,255,.2)}
.dc-seg:last-child{border-right:0}
.dc-seg-label{font-size:10px;letter-spacing:.08em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dc-seg-time{font-size:10px;opacity:.8}

.docs-steps{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:stretch}
.docs-steps>*{display:flex;flex-direction:column}
.docs-steps>*>.docs-step{flex:1;height:100%}
.docs-step{border:1px solid var(--line);border-radius:12px;padding:24px;background:var(--panel);display:flex;flex-direction:column;gap:10px}
.docs-step.kind-human{background:linear-gradient(180deg,#fff,var(--warn-bg))}
.docs-step.kind-auto{background:linear-gradient(180deg,#fff,var(--accent-bg))}
.docs-step .ds-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ds-n{font-size:11px;letter-spacing:.14em;color:var(--ink-4)}
.ds-tag{font-size:10px;padding:2px 8px;border-radius:10px;letter-spacing:.04em;font-weight:500}
.ds-tag.kind-human{background:var(--warn-bg);color:var(--warn);border:1px solid color-mix(in srgb,var(--warn) 22%,transparent)}
.ds-tag.kind-auto{background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-line)}
.ds-tag.kind-mixed{background:#f0ebff;color:#6d45e6;border:1px solid #d8ccff}
.ds-time{margin-left:auto;font-size:11px;color:var(--ink-4);padding:2px 8px;border:1px solid var(--line-3);border-radius:10px}
.docs-step h3{margin:0;font-size:22px;font-weight:500;letter-spacing:-0.015em}
.docs-step p{margin:0;color:var(--ink-3);font-size:14px;line-height:1.55}
.ds-fields{margin-top:6px;display:flex;flex-direction:column;gap:6px;padding-top:12px;border-top:1px dashed var(--line-3)}
.ds-field{display:grid;grid-template-columns:160px 1fr;gap:12px;font-size:12px}
.ds-field-l{font-size:10px;letter-spacing:.12em;color:var(--ink-4)}
.ds-field-v{color:var(--ink-2);font-family:'Geist Mono',monospace;font-size:12px}
.ds-ok{color:var(--ok);margin-left:6px}

.docs-annot{display:grid;grid-template-columns:1.3fr 1fr;gap:32px;align-items:start}
.docs-annot-img{position:relative}
.annot-marker{
  position:absolute;z-index:5;width:24px;height:24px;border-radius:50%;
  background:var(--accent);color:#fff;display:grid;place-items:center;
  font-weight:600;font-size:11px;font-family:'Geist Mono',monospace;
  box-shadow:0 0 0 3px #fff, 0 4px 10px -2px rgba(47,111,235,.4);
}
.docs-annot-legend{display:flex;flex-direction:column;gap:16px}
.dal-row{display:grid;grid-template-columns:28px 1fr;gap:12px;align-items:start}
.dal-marker{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:600}
.dal-t{font-size:15px;font-weight:500;margin-bottom:4px}
.dal-d{margin:0;font-size:13px;color:var(--ink-3);line-height:1.55}

.docs-next{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.docs-next-card{border:1px solid var(--line);border-radius:10px;padding:20px;background:var(--panel)}
.dnc-n{font-size:11px;letter-spacing:.14em;color:var(--accent);margin-bottom:6px}
.docs-next-card h4{margin:0 0 6px;font-size:16px;font-weight:500;letter-spacing:-0.01em}
.docs-next-card p{margin:0;font-size:12.5px;color:var(--ink-3);line-height:1.5}

/* ========= security ========= */
.sec-pillars{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;align-items:stretch}
.sec-pillars>*{display:flex;flex-direction:column}
.sec-pillars>*>.sec-pillar{flex:1;height:100%;display:flex;flex-direction:column}
.sec-pillar{border:1px solid var(--line);border-radius:12px;padding:24px;background:var(--panel)}
.sec-pillar .sp-ico{width:38px;height:38px;border-radius:8px;background:var(--accent-bg);color:var(--accent);display:grid;place-items:center;border:1px solid var(--accent-line);margin-bottom:12px}
.sec-pillar h3{margin:0 0 6px;font-size:19px;font-weight:500;letter-spacing:-0.015em}
.sec-pillar p{margin:0 0 14px;font-size:14px;color:var(--ink-3);line-height:1.55}
.sp-facts{display:flex;flex-direction:column;gap:4px;padding-top:12px;border-top:1px dashed var(--line-3)}
.sp-fact{display:grid;grid-template-columns:140px 1fr;font-size:12px;gap:10px}
.sp-fact-k{font-size:10px;letter-spacing:.12em;color:var(--ink-4)}
.sp-fact-v{color:var(--ink-2);font-family:'Geist Mono',monospace}

.data-flow{display:grid;grid-template-columns:repeat(6,1fr);gap:0;align-items:stretch}
.df-step{display:contents}
.df-node{
  padding:16px 14px;border-radius:10px;background:rgba(22,27,46,.6);
  border:1px solid var(--nav-line);color:#fff;display:flex;flex-direction:column;gap:4px;
  border-left-width:3px;
}
.df-n{font-size:11px;letter-spacing:.14em}
.df-t{font-size:15px;font-weight:500;letter-spacing:-0.01em}
.df-d{font-size:12px;color:var(--nav-ink);line-height:1.45}
.df-sub{margin-top:6px;padding-top:6px;border-top:1px solid var(--nav-line);font-size:10px;letter-spacing:.1em;color:var(--nav-ink-3)}
.df-arrow{display:grid;place-items:center;color:var(--nav-ink-3);padding:0 4px}
.data-flow-note{display:flex;justify-content:center;gap:12px;margin-top:18px;font-size:11px;color:var(--nav-ink-3);letter-spacing:.08em}

.sec-stack{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel)}
.sec-stack-row{display:grid;grid-template-columns:52px 1fr;gap:16px;padding:18px 20px;border-bottom:1px solid var(--line-2);align-items:center}
.sec-stack-row:last-child{border-bottom:0}
.ssr-logo{width:40px;height:40px;border-radius:8px;background:var(--line-2);color:var(--ink-2);display:grid;place-items:center;font-weight:600;font-size:16px}
.ssr-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ssr-name{font-weight:500;font-size:15px}
.ssr-role{font-size:12px;color:var(--ink-4)}
.ssr-cert{margin-left:auto;font-size:10px;padding:2px 8px;background:var(--ok-bg);color:var(--ok);border:1px solid color-mix(in srgb,var(--ok) 24%,transparent);border-radius:10px;letter-spacing:.04em}
.ssr-d{margin:4px 0 0;font-size:13px;color:var(--ink-3);line-height:1.5}

.sec-certs{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sec-cert{border:1px solid var(--line);border-radius:10px;padding:16px 18px;background:var(--panel)}
.sec-cert.kind-live{border-color:color-mix(in srgb,var(--ok) 30%,transparent);background:linear-gradient(180deg,#fff,var(--ok-bg))}
.sec-cert.kind-progress{border-color:color-mix(in srgb,var(--warn) 30%,transparent);background:linear-gradient(180deg,#fff,var(--warn-bg))}
.scert-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:10px;letter-spacing:.08em}
.scert-status.kind-live{color:var(--ok)}
.scert-status.kind-progress{color:var(--warn)}
.scert-status.kind-planned{color:var(--ink-4)}
.scert-date{color:var(--ink-4)}
.scert-name{font-size:14px;font-weight:500;letter-spacing:-0.01em}

.sec-rights{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.sec-right{display:grid;grid-template-columns:32px 1fr;gap:12px;padding:18px;border:1px solid var(--line);border-radius:10px;background:var(--panel);align-items:start}
.sr-ico{width:26px;height:26px;border-radius:50%;background:var(--ok-bg);color:var(--ok);display:grid;place-items:center;border:1px solid color-mix(in srgb,var(--ok) 24%,transparent)}
.sr-t{font-size:15px;font-weight:500;margin-bottom:4px}
.sr-d{margin:0;font-size:13px;color:var(--ink-3);line-height:1.55}

.sec-contact{display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap;padding:28px 32px;background:var(--panel);border:1px solid var(--line);border-radius:12px}
.sec-contact h3{margin:0 0 6px;font-size:22px;font-weight:500;letter-spacing:-0.015em}
.sec-contact p{margin:0;color:var(--ink-3);font-size:14px;max-width:480px}
.sec-contact-links{display:flex;gap:8px;flex-wrap:wrap}

@media (max-width:900px){
  .docs-steps,.docs-annot,.sec-pillars,.sec-rights{grid-template-columns:1fr}
  .docs-next,.sec-certs{grid-template-columns:1fr 1fr}
  .data-flow{grid-template-columns:1fr}
  .df-arrow{transform:rotate(90deg);padding:4px 0}
}
@media (max-width:900px){
  .ps-grid,.ss-showcase,.ss-showcase.three,.testi-grid,.usecase-grid{grid-template-columns:1fr}
  .pricing-grid{grid-template-columns:1fr 1fr}
  .logos{grid-template-columns:repeat(2,1fr)}
  .logos .cell{border-bottom:1px solid var(--line-2)}
  .logos .cell:nth-child(2n){border-right:0}
  .stack-tbl .row{grid-template-columns:1fr 1fr}
  .flow{grid-template-columns:1fr}
  .flow-step{border-right:0;border-bottom:1px solid var(--line)}
  .flow-step::after{display:none}
  .compare-tbl .row{grid-template-columns:1.4fr repeat(4,1fr)}
  .nav-links{display:none}
  footer .grid{grid-template-columns:1fr 1fr}
}

/* ========= screenshot showcase cards ========= */
.ss-showcase{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:28px;align-items:stretch}
.ss-showcase.three{grid-template-columns:repeat(3,1fr)}
.ss-showcase>*{display:flex;flex-direction:column}
.ss-showcase>*>.ss-card{flex:1}
@media (max-width:980px){.ss-showcase,.ss-showcase.three{grid-template-columns:1fr}}
.ss-card{
  background:var(--panel);border:1px solid var(--line);border-radius:12px;
  overflow:hidden;display:flex;flex-direction:column;height:100%;
  box-shadow:0 1px 0 rgba(12,20,42,.02),0 20px 40px -28px rgba(12,20,42,.14);
  transition:transform 160ms,box-shadow 160ms,border-color 160ms;
}
.ss-card:hover{transform:translateY(-2px);border-color:var(--line-3);box-shadow:0 1px 0 rgba(12,20,42,.02),0 28px 56px -28px rgba(12,20,42,.18)}
.ss-head{
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
  padding:18px 20px 14px;border-bottom:1px solid var(--line-2);
  min-height:88px;
}
.ss-head h4{margin:0 0 4px;font-size:15px;font-weight:500;letter-spacing:-0.01em}
.ss-head p{margin:0;font-size:12.5px;color:var(--ink-4);line-height:1.5}
.ss-head .mono{font-size:10px;color:var(--ink-4);letter-spacing:.08em;text-transform:uppercase;flex-shrink:0;white-space:nowrap;padding-top:4px}
.ss-body{
  flex:1;padding:20px;background:var(--panel-2);
  display:flex;align-items:flex-start;justify-content:center;
  height:380px;overflow:hidden;
}
.ss-body>*{width:100%;max-width:100%}

/* ========= testimonials ========= */
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:24px;align-items:stretch}
.testi-grid>*{display:flex;flex-direction:column}
.testi-grid>*>.testi{flex:1}
@media (max-width:900px){.testi-grid{grid-template-columns:1fr}}
.testi{
  background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:24px;display:flex;flex-direction:column;gap:16px;height:100%;
  box-shadow:0 1px 0 rgba(12,20,42,.02),0 20px 40px -28px rgba(12,20,42,.12);
  transition:border-color 160ms,transform 160ms,box-shadow 160ms;
}
.testi:hover{border-color:var(--line-3);transform:translateY(-2px);box-shadow:0 1px 0 rgba(12,20,42,.02),0 28px 56px -28px rgba(12,20,42,.18)}
.testi .quote{
  font-size:15px;line-height:1.55;color:var(--ink-2);letter-spacing:-0.005em;
  flex:1;text-wrap:pretty;
}
.testi .auth{display:flex;align-items:center;gap:12px}
.testi .av{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(140deg,#3a4268,#1d2338);color:#fff;
  display:grid;place-items:center;font-size:12px;font-weight:600;letter-spacing:-.01em;
  flex:0 0 36px;
}
.testi .auth .n{font-size:13.5px;font-weight:500}
.testi .auth .r{font-size:12px;color:var(--ink-4);margin-top:2px}
.testi .meta{
  display:flex;gap:14px;padding-top:14px;border-top:1px dashed var(--line-3);
  font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.04em;color:var(--ink-4);
  flex-wrap:wrap;
}
.testi .meta .up{color:var(--ok)}
</style>
</head>
